# Gradle properties for Android build
# This file fixes compatibility issues with newer Gradle versions

# Use Gradle 8.4 (compatible with AGP 8.x)
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-all.zip

# JVM args for better performance
org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Enable parallel builds
org.gradle.parallel=true

# Enable build cache
org.gradle.caching=true

# Use non-transitive R classes (reduces build time)
android.nonTransitiveRClass=true

# Disable Jetifier (not needed for modern libraries)
android.enableJetifier=false

# Enable AndroidX
android.useAndroidX=true

# Suppress deprecation warnings
android.suppressUnsupportedCompileSdk=true
