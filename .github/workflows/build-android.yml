name: Build Android APK & AAB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install EAS CLI
        run: yarn global add eas-cli

      - name: Expo Prebuild (Generate Android folder)
        run: npx expo prebuild --platform android --clean

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-factory-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-factory-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: ignore

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-factory-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: ignore

  auto-fix:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Build Failed Notification
        run: |
          echo "Build failed! Auto-correction mode should analyze the error logs."
          echo "Check the build logs above for errors and fix them."
