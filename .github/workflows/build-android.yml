name: Build Android APK & AAB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Clear Metro cache
        run: |
          rm -rf node_modules/.cache
          rm -rf /tmp/metro-*

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Fix Gradle Configuration
        run: |
          # Copy optimized gradle properties
          if [ -f "android-config/gradle.properties" ]; then
            cp android-config/gradle.properties android/gradle.properties
          fi
          
          # Update gradle wrapper to compatible version
          cd android
          sed -i 's/distributionUrl=.*/distributionUrl=https\\:\/\/services.gradle.org\/distributions\/gradle-8.4-all.zip/' gradle/wrapper/gradle-wrapper.properties
          
          # Show config for debugging
          echo "=== gradle-wrapper.properties ==="
          cat gradle/wrapper/gradle-wrapper.properties
          echo ""
          echo "=== gradle.properties ==="
          cat gradle.properties

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Clean Gradle
        working-directory: android
        run: ./gradlew clean --warning-mode all

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode all
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-factory-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Build Release AAB (Play Store)
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon --warning-mode all
        continue-on-error: true

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-factory-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: ignore
