name: Build Android APK & AAB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Clear Metro cache
        run: |
          rm -rf node_modules/.cache
          rm -rf /tmp/metro-*

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Fix Kotlin/Gradle Compatibility
        run: |
          cd android
          
          # Fix gradle.properties
          cat >> gradle.properties << 'EOF'
          
          # Kotlin compatibility fixes
          kotlin.jvm.target.validation.mode=warning
          android.suppressUnsupportedCompileSdk=34
          org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.parallel=true
          org.gradle.caching=true
          EOF
          
          # Set Kotlin version in build.gradle
          sed -i 's/kotlinVersion = .*/kotlinVersion = "1.9.22"/' build.gradle 2>/dev/null || true
          
          # Update settings.gradle to fix layout issue
          if grep -q "layout" settings.gradle; then
            sed -i 's/layout\.projectDirectory/rootProject.projectDir/g' settings.gradle
          fi
          
          # Add Kotlin version to root build.gradle if not present
          if ! grep -q "ext.kotlinVersion" build.gradle; then
            sed -i '1i buildscript { ext.kotlinVersion = "1.9.22" }' build.gradle
          fi
          
          echo "=== gradle.properties ==="
          cat gradle.properties
          echo ""
          echo "=== build.gradle (first 30 lines) ==="
          head -30 build.gradle

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode all
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-factory-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
