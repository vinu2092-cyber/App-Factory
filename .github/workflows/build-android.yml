name: Build Android APK & AAB (DISABLED)

# DISABLED - Use "Build APK (Simple)" instead
# This workflow has Kotlin compatibility issues

on:
  workflow_dispatch:  # Only manual trigger now

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Clear Metro cache
        run: |
          rm -rf node_modules/.cache
          rm -rf /tmp/metro-*

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Fix Kotlin/Gradle Compatibility
        run: |
          cd android
          
          # Expo SDK 54 requires Kotlin 2.0.0 or higher (NOT 1.9.x!)
          # Supported: 2.2.20, 2.2.10, 2.2.0, 2.1.x, 2.0.x
          sed -i 's/kotlinVersion = "[^"]*"/kotlinVersion = "2.0.0"/' build.gradle
          sed -i 's/ext\.kotlinVersion = "[^"]*"/ext.kotlinVersion = "2.0.0"/' build.gradle
          
          # Fix gradle.properties
          cat >> gradle.properties << 'EOF'
          
          # Kotlin compatibility fixes
          kotlin.jvm.target.validation.mode=warning
          android.suppressUnsupportedCompileSdk=34
          org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.parallel=true
          org.gradle.caching=true
          EOF
          
          echo "=== Kotlin version check ==="
          grep -i "kotlinVersion" build.gradle || echo "No kotlinVersion found"
          echo ""
          echo "=== gradle.properties ==="
          cat gradle.properties

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode all
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-factory-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
