name: Build APK (Simple)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: yarn install

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Patch Kotlin Issues
        run: |
          cd android
          
          # Add Kotlin version explicitly
          cat > kotlin-version.gradle << 'KOTLIN'
          ext {
              kotlinVersion = '1.9.22'
          }
          KOTLIN
          
          # Prepend kotlin version to build.gradle
          cat kotlin-version.gradle build.gradle > temp.gradle && mv temp.gradle build.gradle
          
          # Fix gradle.properties for compatibility
          echo "" >> gradle.properties
          echo "kotlin.jvm.target.validation.mode=warning" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx4096m" >> gradle.properties
          
          # Debug output
          echo "=== build.gradle start ==="
          head -20 build.gradle
          echo "=== gradle.properties ==="
          cat gradle.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk
