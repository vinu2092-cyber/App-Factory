name: Build APK (Simple)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: yarn install

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Fix Kotlin Version (Expo SDK 54 requires Kotlin 2.0+)
        run: |
          cd android
          
          # Expo SDK 54 requires Kotlin 2.0.0 or higher
          # Update build.gradle to use Kotlin 2.0.0
          sed -i 's/kotlinVersion = "[^"]*"/kotlinVersion = "2.0.0"/' build.gradle
          
          # Also update if it's using ext block
          sed -i 's/ext\.kotlinVersion = "[^"]*"/ext.kotlinVersion = "2.0.0"/' build.gradle
          
          # Fix gradle.properties for compatibility
          echo "" >> gradle.properties
          echo "kotlin.jvm.target.validation.mode=warning" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx4096m" >> gradle.properties
          
          # Debug output
          echo "=== build.gradle (checking Kotlin version) ==="
          grep -i "kotlin" build.gradle | head -10
          echo ""
          echo "=== gradle.properties ==="
          cat gradle.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk
