name: Build Android APK with EAS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Build with EAS (Local)
        run: |
          # Build locally without EAS account (for open source projects)
          npx eas-cli build --platform android --profile preview --local --non-interactive --output=./app-release.apk
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-factory-apk
          path: ./app-release.apk
          if-no-files-found: warn
